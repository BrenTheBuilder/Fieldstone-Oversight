<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 272 76" role="img" aria-label="Fieldstone Oversight">
  <defs>
    <clipPath id="clip-top">
      <polygon points="46,3 81,21 46,39 11,21"/>
    </clipPath>
    <clipPath id="clip-left">
      <polygon points="11,21 46,39 46,73 11,57"/>
    </clipPath>
    <clipPath id="clip-right">
      <polygon points="46,39 81,21 81,57 46,73"/>
    </clipPath>
  </defs>

  <!-- TOP FACE (gold) -->
  <polygon points="46,3 81,21 46,39 11,21" fill="#C4963A"/>
  <g clip-path="url(#clip-top)" stroke="rgba(0,0,0,0.1)" stroke-width="0.7" fill="none">
    <line x1="11" y1="30" x2="46" y2="3"/>
    <line x1="28" y1="39" x2="63" y2="3"/>
    <line x1="46" y1="39" x2="72" y2="9"/>
    <line x1="28" y1="3" x2="63" y2="39"/>
    <line x1="46" y1="3" x2="81" y2="39"/>
    <line x1="60" y1="3" x2="81" y2="25"/>
  </g>

  <!-- LEFT FACE (deep dark) -->
  <polygon points="11,21 46,39 46,73 11,57" fill="#162030"/>
  <g clip-path="url(#clip-left)" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" fill="none">
    <line x1="11" y1="33" x2="46" y2="51"/>
    <line x1="11" y1="45" x2="46" y2="63"/>
    <line x1="28" y1="21" x2="28" y2="43"/>
    <line x1="20" y1="33" x2="20" y2="50"/>
    <line x1="37" y1="33" x2="37" y2="50"/>
    <line x1="28" y1="45" x2="28" y2="63"/>
    <line x1="19" y1="57" x2="19" y2="73"/>
    <line x1="36" y1="57" x2="36" y2="73"/>
  </g>

  <!-- RIGHT FACE (electric blue) -->
  <polygon points="46,39 81,21 81,57 46,73" fill="#2D7DD2"/>
  <g clip-path="url(#clip-right)" stroke="rgba(255,255,255,0.2)" stroke-width="0.8" fill="none">
    <line x1="46" y1="51" x2="81" y2="33"/>
    <line x1="46" y1="63" x2="81" y2="45"/>
    <line x1="63" y1="21" x2="63" y2="43"/>
    <line x1="55" y1="39" x2="55" y2="52"/>
    <line x1="72" y1="39" x2="72" y2="52"/>
    <line x1="63" y1="51" x2="63" y2="64"/>
    <line x1="55" y1="57" x2="55" y2="73"/>
    <line x1="72" y1="57" x2="72" y2="73"/>
  </g>

  <!-- Outer edges -->
  <polygon points="46,3 81,21 81,57 46,73 11,57 11,21" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="0.9"/>
  <line x1="46" y1="39" x2="46" y2="73" stroke="rgba(0,0,0,0.12)" stroke-width="0.7"/>
  <line x1="46" y1="39" x2="81" y2="21" stroke="rgba(0,0,0,0.1)" stroke-width="0.6"/>
  <line x1="46" y1="39" x2="11" y2="21" stroke="rgba(0,0,0,0.1)" stroke-width="0.6"/>

  <!-- FIELDSTONE (dark) -->
  <text x="97" y="34"
    font-family="'Inter','Arial Black','Arial',sans-serif"
    font-weight="800"
    font-size="23"
    fill="#0F1923"
    letter-spacing="0.5">FIELDSTONE</text>

  <!-- OVERSIGHT (electric blue) -->
  <line x1="97" y1="50" x2="113" y2="50" stroke="#2D7DD2" stroke-width="1.2"/>
  <text x="118" y="55"
    font-family="'Inter','Arial',sans-serif"
    font-weight="500"
    font-size="11"
    fill="#2D7DD2"
    letter-spacing="3">OVERSIGHT</text>
  <line x1="218" y1="50" x2="258" y2="50" stroke="#2D7DD2" stroke-width="1.2"/>
</svg>
